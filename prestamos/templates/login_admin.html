<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Restringido - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 100vh;">
    
    <div class="card p-4 shadow-lg" style="width: 380px; background-color: #1e2124; border: 1px solid #444;">
        <div class="text-center mb-4">
            <p style="font-size: 14px; color: #aaa;">Solo el Jefe de Departamento puede modificar el inventario.</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-bold">Clave de autorización:</label>
                <input type="password" name="clave" class="form-control bg-dark text-white" style="border-color: #555;" placeholder="Ingresa la clave..." required autofocus>
            </div>
            
            {% if error %}
                <div class="alert alert-danger py-2" style="font-size: 13px;">
                    {{ error }}
                </div>
            {% endif %}
            
            <button type="submit" class="btn btn-warning w-100 fw-bold mb-2">Validar y Acceder</button>
            <a href="/inventario/" class="btn btn-outline-light w-100">Regresar al sistema</a>
        </form>
    </div>

</body>
</html>
